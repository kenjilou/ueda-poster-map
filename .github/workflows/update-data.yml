name: Update Map Data
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'  # 12時間ごとに自動実行

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Python dependencies
        run: pip install -r python-requirements.txt
      - name: Setup Directory
        run: |
          mkdir -p data
          mkdir -p data/block
      - name: Download CSV
        run: curl -sL "${{ secrets.CSV_URL }}" > data/all.csv
      - name: Convert CSV to JSON
        run: python csv2json_small.py data/all.csv data
      - name: Summarize Progress
        run: |
          python summarize_progress.py data/summary.json
          python summarize_progress_absolute.py data/summary_absolute.json
      - name: Commit & push changes
        run: |
          git add -N .
          if ! git diff --exit-code --quiet
          then
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add .
            git commit -m "Update"
            git pull --rebase
            git push
          fi
